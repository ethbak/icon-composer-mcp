name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Run unit tests
        run: bun test

      - name: Run MCP integration tests
        run: bun run build && npx vitest run

      - name: Verify dist works with Node
        run: node dist/cli.js doctor || true

      - name: Verify package contents
        run: npm pack --dry-run 2>&1 | tail -20
